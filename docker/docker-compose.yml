services:
  solr:
    image: solr:8
    container_name: climatica-solr
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
      - ./solr/solrconfig.xml:/opt/solr/server/solr/configsets/_default/conf/solrconfig.xml
    environment:
      - SOLR_JAVA_MEM=-Xms512m -Xmx1g
    command: solr-precreate cities
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8983/solr/cities/admin/ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: climatica-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  solr_data:
  redis_data:
